<section class="py-8 antialiased md:py-16">
  <div class="w-full mx-auto max-w-7xl px-4 2xl:px-0">
    <h2 class="text-xl font-semibold text-gray-900 sm:text-3xl mb-5">Wishlist</h2>
    @if (!wishlistService.userWishlist) {
      <app-loading-spinner />
    } @else {
      @if (!wishlistService.userWishlist.length) {
        <div class="bg-green-100 border-l-4 border-green-500 text-green-700 p-4" role="alert">
          <p class="font-bold">No Added Products Yet!</p>
        </div>
      } @else {
        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-3">
          @for (product of wishlistService.userWishlist; track $index) {
            <app-wishlist [product]="product" />
          }
        </div>
      }
    }
  </div>
</section>
