<form [formGroup]="loginForm">
  <div class="mt-10">
    <div class="mx-auto sm:w-9/12 md:w-1/2">
      <!-- (input field): user email -->
      <app-auth-input
        formControlName="email"
        [type]="'email'"
        [name]="'userEmail'"
        [id]="'userEmail'"
        [label]="'User Email'"
      />

      <!-- (input field): user password -->
      <div class="relative">
        <app-auth-input
          formControlName="password"
          [type]="isShowPassword ? 'text' : 'password'"
          [name]="'userPassword'"
          [id]="'userPassword'"
          [label]="'Password'"
        />
        <button
          (click)="isShowPassword = !isShowPassword"
          class="absolute top-1/2 -translate-y-1/2 end-2.5 cursor-pointer"
        >
          @if (!isShowPassword) {
            <i class="fas fa-eye"></i>
          } @else {
            <i class="fas fa-eye-slash"></i>
          }
        </button>
      </div>

      <!-- Login Button -->
      <div>
        <button
          (click)="submitData()"
          [disabled]="isLoading"
          [class.bg-white]="isLoading"
          [class.text-black]="isLoading"
          class="w-full main-btn"
        >
          @if (isLoading) {
            <i class="fas fa-spinner fa-spin"></i>
          } @else {
            Login
          }
        </button>
      </div>

      @if (errorMessage) {
        <div class="mt-5">
          <div class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4" role="alert">
            <p class="font-bold">
              {{ errorMessage }}
            </p>
          </div>
        </div>
      } @else if (successMessage) {
        <div class="mt-5">
          <div class="bg-green-100 border-l-4 border-green-500 text-green-700 p-4" role="alert">
            <p class="font-bold">
              {{ successMessage }}
            </p>
            <p>You will be redirected in {{ redirectCounter }} seconds...</p>
          </div>
        </div>
      }
    </div>
  </div>
</form>
